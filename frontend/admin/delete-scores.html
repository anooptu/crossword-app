<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete ABC Cricket Crossword Data</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <p class="event-kicker">Run by ABC</p>
        <h1>Delete Cricket Crossword Data</h1>
        <p>This will permanently delete all game logs, leaderboard scores, and attempt history for the cricket crossword. This action cannot be undone.</p>
        <div id="message" style="display: none;"></div>
        <div>
            <button id="delete-scores-btn" class="btn">Delete Everything</button>
            <a href="/admin/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
    <script src="/js/admin-delete-scores.js"></script>
</body>
</html>
