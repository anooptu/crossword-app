<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset ABC Cricket Crossword Leaderboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <p class="event-kicker">Run by ABC</p>
        <h1>Reset Cricket Crossword Leaderboard</h1>
        <p>Are you sure you want to reset every participant score to 0? This action cannot be undone.</p>
        <div id="message" style="display: none;"></div>
        <div>
            <button id="reset-leaderboard-btn" class="btn">Reset All Scores</button>
            <a href="/admin/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
    <script src="/js/admin-reset-leaderboard.js"></script>
</body>
</html>
